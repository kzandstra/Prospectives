<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail de l'Agent | EVARISTE IA</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  
  <style>
    /* Specific styles for detail page */
    .detail-hero {
      padding: calc(var(--nav-height) + var(--space-12)) 0 var(--space-12);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    
    .detail-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-6);
      margin-bottom: var(--space-8);
    }
    
    .detail-icon {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .detail-icon svg {
      width: 40px;
      height: 40px;
    }
    
    .detail-title {
      font-size: var(--text-4xl);
      margin-bottom: var(--space-2);
    }
    
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: var(--space-10);
      padding: var(--space-12) 0;
    }
    
    .chatbot-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      height: 700px;
      box-shadow: var(--shadow-md);
    }
    
    .chatbot-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .info-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }
    
    .info-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
    }
    
    .info-card__title {
      font-size: var(--text-lg);
      font-weight: 600;
      margin-bottom: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--text-secondary);
      margin-bottom: var(--space-6);
      font-weight: 500;
    }
    
    .back-link:hover {
      color: var(--text-primary);
    }
    
    @media (max-width: 1024px) {
      .detail-layout {
        grid-template-columns: 1fr;
      }
      
      .chatbot-container {
        height: 600px;
        order: -1; /* Move chat to top on mobile */
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__container">
      <a href="../index.html" class="nav__logo">
        <div class="nav__logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        </div>
        EVARISTE <span style="color: var(--blue); font-weight: 400; margin-left: 2px;">IA</span>
      </a>
      <a href="../index.html#agents" class="btn btn--ghost">Retour au catalogue</a>
    </div>
  </nav>

  <!-- Content injected by JS -->
  <div id="app-content"></div>

  <!-- Scripts -->
  <script src="../js/agents-data.js"></script>
  <script src="../js/components.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Get agent ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const agentId = urlParams.get('agent');
      
      if (!agentId) {
        window.location.href = '../index.html';
        return;
      }
      
      const agent = AGENTS_DATA.find(a => a.id === agentId);
      
      if (!agent) {
        document.getElementById('app-content').innerHTML = `
          <div class="container" style="padding-top: 150px; text-align: center;">
            <h2>Agent introuvable</h2>
            <p>L'agent demandé n'existe pas.</p>
            <a href="../index.html" class="btn btn--primary" style="margin-top: 20px;">Retour à l'accueil</a>
          </div>
        `;
        return;
      }
      
      // Update page title
      document.title = `${agent.name} | EVARISTE IA`;
      
      // Render content
      renderAgentDetail(agent);
    });
    
    function renderAgentDetail(agent) {
      const container = document.getElementById('app-content');
      
      const statusDotClass = agent.status === "active" ? "active" : agent.status === "beta" ? "beta" : "coming";
      
      let chatContent = '';
      if (agent.embedUrl) {
        chatContent = `<iframe src="${agent.embedUrl}" class="chatbot-iframe" title="Chatbot ${agent.name}"></iframe>`;
      } else {
        chatContent = `
          <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); padding: 2rem; text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🤖</div>
            <h3>L'agent n'est pas encore connecté</h3>
            <p style="margin-top: 0.5rem; max-width: 400px;">L'URL d'intégration Copilot Studio n'a pas encore été configurée pour cet agent.</p>
          </div>
        `;
      }
      
      container.innerHTML = `
        <header class="detail-hero">
          <div class="container">
            <a href="../index.html#agents" class="back-link">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
              Retour aux agents
            </a>
            
            <div class="detail-header">
              <div class="detail-icon ${agent.color}" style="background: var(--${agent.color}-bg); color: var(--${agent.color});">
                ${getIcon(agent.icon)}
              </div>
              <div>
                <h1 class="detail-title">${agent.name}</h1>
                <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
                  <span class="badge badge--${agent.color}">${agent.category}</span>
                  <div class="agent-card__status" style="margin: 0;">
                    <span class="agent-card__status-dot ${statusDotClass}"></span>
                    ${getStatusLabel(agent.status)}
                  </div>
                </div>
                <p style="font-size: var(--text-lg); color: var(--text-secondary); max-width: 800px;">
                  ${agent.shortDesc}
                </p>
              </div>
            </div>
          </div>
        </header>
        
        <main class="container">
          <div class="detail-layout">
            <div class="chatbot-container">
              ${chatContent}
            </div>
            
            <aside class="info-sidebar">
              <div class="info-card">
                <h3 class="info-card__title">À propos de cet agent</h3>
                <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 1.5rem;">
                  ${agent.longDesc}
                </p>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                  ${agent.tags.map(tag => `<span class="agent-card__tag">${tag}</span>`).join("")}
                </div>
              </div>
              
              <div class="info-card">
                <h3 class="info-card__title">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                  Comment l'utiliser ?
                </h3>
                <ul style="color: var(--text-secondary); line-height: 1.6; list-style-type: disc; padding-left: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
                  <li>Posez des questions claires et précises.</li>
                  <li>Si la réponse n'est pas complète, demandez-lui d'élaborer.</li>
                  <li>N'hésitez pas à lui demander de formuler différemment.</li>
                  <li>L'agent apprend de ses interactions, vos retours sont précieux.</li>
                </ul>
              </div>
            </aside>
          </div>
        </main>
      `;
    }
  </script>
</body>
</html>
